<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <title>Vitalle</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/logo-vitalle.png" sizes="512x512">
    <link rel="apple-touch-icon" href="/logo-vitalle.png" sizes="512x512">
    
    <!-- PWA Theme Colors -->
    <meta name="theme-color" content="#d946ef">
    
    <!-- Apple PWA Elite Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vitalle">
    <meta name="apple-mobile-web-app-status-bar" content="#d946ef">
    
    <!-- Additional iOS/Safari -->
    <meta name="apple-touch-fullscreen" content="yes">
    
    <style>
      /* Fullscreen Mobile App - Natural Scroll Enabled */
      * { box-sizing: border-box; }
      html, body { 
        margin: 0; 
        padding: 0; 
        min-height: 100vh; 
        height: 100%; 
        overflow-y: auto; 
        touch-action: manipulation;
      }
      #root { 
        min-height: 100vh; 
        min-height: 100dvh;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
